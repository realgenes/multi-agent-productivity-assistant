steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --set-env-vars
      - GOOGLE_GENAI_MODEL=${_MODEL},GOOGLE_USE_VERTEX_AI=${_USE_VERTEX_AI},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_CALENDAR_CLIENT_ID=${_GOOGLE_CALENDAR_CLIENT_ID},GOOGLE_CALENDAR_CLIENT_SECRET=${_GOOGLE_CALENDAR_CLIENT_SECRET},GOOGLE_CALENDAR_REFRESH_TOKEN=${_GOOGLE_CALENDAR_REFRESH_TOKEN},GOOGLE_CALENDAR_ID=${_GOOGLE_CALENDAR_ID},GOOGLE_CALENDAR_TIMEZONE=${_GOOGLE_CALENDAR_TIMEZONE},MCP_SERVERS_JSON=${_MCP_SERVERS_JSON}

substitutions:
  _SERVICE_NAME: multi-agent-productivity-assistant
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/multi-agent-productivity-assistant/app:latest
  _MODEL: gemini-2.5-flash
  _USE_VERTEX_AI: "true"
  _RUNTIME_SERVICE_ACCOUNT: multi-agent-run@$PROJECT_ID.iam.gserviceaccount.com
  _GOOGLE_CALENDAR_CLIENT_ID: ""
  _GOOGLE_CALENDAR_CLIENT_SECRET: ""
  _GOOGLE_CALENDAR_REFRESH_TOKEN: ""
  _GOOGLE_CALENDAR_ID: primary
  _GOOGLE_CALENDAR_TIMEZONE: Asia/Kolkata
  _MCP_SERVERS_JSON: "[]"
