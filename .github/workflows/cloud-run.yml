name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: multi-agent-productivity-assistant
  REGION: us-central1
  ARTIFACT_REPOSITORY: multi-agent-productivity-assistant
  IMAGE_NAME: app
  GOOGLE_GENAI_MODEL: gemini-2.5-flash

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure deployment variables
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_ID="$(echo -n '${{ secrets.GCP_PROJECT_ID }}' | tr -d '\r\n' | xargs)"
          RUNTIME_SERVICE_ACCOUNT="$(echo -n '${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}' | tr -d '\r\n' | xargs)"
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "RUNTIME_SERVICE_ACCOUNT=$RUNTIME_SERVICE_ACCOUNT" >> "$GITHUB_ENV"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "Using IMAGE=$IMAGE"

      - name: Verify Artifact Registry repository exists
        shell: bash
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe "${{ env.ARTIFACT_REPOSITORY }}" \
            --location "${{ env.REGION }}" \
            --project "$PROJECT_ID" >/dev/null

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --set-env-vars "GOOGLE_GENAI_MODEL=${{ env.GOOGLE_GENAI_MODEL }},GOOGLE_USE_VERTEX_AI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${{ env.REGION }}"
